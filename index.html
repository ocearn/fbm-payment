<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Payment Request Form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Form Container Section -->
    <div class="form-container">
        <h2>পেমেন্ট রিকোয়েস্ট ফর্ম</h2>
        
        <!-- Start of the payment form -->
        <form id="paymentForm">
            <!-- Row for Chat ID and Account Type -->
            <div class="row">
                <!-- Chat ID Field -->
                <div class="field">
                    <label for="chatId">Chat ID:</label>
                    <input type="text" id="chatId" name="chatId" placeholder="Enter Chat ID" pattern="\d{9,11}" maxlength="11" required> 
                    <!-- Added validation pattern for chat ID, length restriction to 10 digits -->
                </div>

                <!-- Account Type Dropdown -->
                <div class="field">
                    <label for="accountType">Account Type:</label>
                    <select id="accountType" name="accountType" required>
                        <option value="">---Select---</option>
                        <option value="Facebook">Facebook</option>
                        <option value="Gmail">Gmail</option>
                        <option value="Instagram">Instagram</option>
                    </select>
                </div>
            </div>

            <!-- Row for Friend Type, Mail Type, and Account Date -->
            <div class="row">
                <!-- Friend Type Dropdown -->
                <div class="field">
                    <label for="friendType">Friend:</label>
                    <select id="friendType" name="friendType" required>
                        <option value="">---Select---</option>
                        <option value="0+">0+</option>
                        <option value="30+">30+</option>
                    </select>
                </div>
                
                <!-- Mail Type Dropdown -->
                <div class="field">
                    <label for="mailType">Mail Type:</label>
                    <select id="mailType" name="mailType" required>
                        <option value="">---Select---</option>
                        <option value="1sc Mail">1Sec Mail</option>
                        <option value="Temp Mail">Temp Mail</option>
                    </select>
                </div>
                
                <!-- Account Date Picker -->
                <div class="field">
                    <label for="accountDate">Account Date:</label>
                    <input type="date" id="accountDate" name="accountDate" required>
                </div>
            </div>

            <!-- Payment Method Section -->
            <label for="paymentMethod">Payment Method:</label>
            <select id="paymentMethod" name="paymentMethod" required>
                <option value="">---Select---</option>
                <option value="Bkash">Bkash</option>
                <option value="Nagad">Nagad</option>
                <option value="Rocket">Rocket</option>
            </select>

            <!-- Payment Number Section -->
            <label for="paymentNumber">Payment Number:</label>
            <input type="text" id="paymentNumber" name="paymentNumber" placeholder="01xxxxxxxxx" pattern="01[0-9]{9}" maxlength="11" required>
            <!-- Added phone number validation pattern to match Bangladesh number format -->
            
            <!-- Submit Button -->
            <button type="submit" id="confirmButton">Confirm</button>
        </form>
    </div>

    <!-- Popup Message on Successful Submission -->
    <div id="popup" class="popup">
        <div class="popup-content">
            <p>পেমেন্ট রিকুয়েস্ট সফলভাবে জমা হয়েছে!</p>
            <!-- Popup message displayed after form submission -->
            <button onclick="closePopup()">OK</button>
            <!-- Button to close the popup -->
        </div>
    </div>

    <!-- JavaScript to Handle Form Submission and Popup -->
    <script src="script.js"></script>
</body>

</html>
